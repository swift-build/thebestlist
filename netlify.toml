[build]
  command   = "bundle exec jekyll build"
  publish   = "_site"

[build.environment]
  RUBY_VERSION = "3.2.0"
  JEKYLL_ENV   = "production"

# Redirect www → apex
[[redirects]]
  from   = "https://www.thebestlistindia.com/*"
  to     = "https://thebestlistindia.com/:splat"
  status = 301
  force  = true
