[build]
  command   = "bundle exec jekyll build"
  publish   = "_site"

[build.environment]
  RUBY_VERSION = "3.2.0"
  JEKYLL_ENV   = "production"

# Safari requests /favicon.ico — serve our 32x32 PNG
[[redirects]]
  from   = "/favicon.ico"
  to     = "/assets/favicon-32.png"
  status = 302

# Redirect www → apex
[[redirects]]
  from   = "https://www.thebestlistindia.com/*"
  to     = "https://thebestlistindia.com/:splat"
  status = 301
  force  = true
