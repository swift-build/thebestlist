<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.meta_title %}{{ page.meta_title }}{% elsif page.title %}{{ page.title }} | The Best List India{% else %}The Best List India{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  {% if site.google_site_verification %}<meta name="google-site-verification" content="{{ site.google_site_verification }}">{% endif %}

  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon.png' | absolute_url }}">
  <link rel="shortcut icon" href="{{ '/assets/favicon.png' | absolute_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/favicon.png' | absolute_url }}">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <!-- Netlify Identity — handles CMS login redirect -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  {% if site.google_analytics %}
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}

  {% seo %}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- After login, redirect to /admin/ -->
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>

  <script>
    (function() {
      var content = document.querySelector('.post-content');
      if (!content) return;
      var children = Array.from(content.children);
      var i = 0;
      while (i < children.length) {
        var el = children[i];
        var imgs = el.querySelectorAll && el.querySelectorAll('img');
        if (imgs && imgs.length >= 2) {
          var gallery = document.createElement('div');
          gallery.className = 'content-gallery';
          Array.from(imgs).forEach(function(img) {
            var alt = img.getAttribute('alt') || '';
            var fig = document.createElement('figure');
            fig.appendChild(img);
            if (alt) {
              var cap = document.createElement('figcaption');
              cap.textContent = alt;
              fig.appendChild(cap);
            }
            gallery.appendChild(fig);
          });
          content.replaceChild(gallery, el);
          continue;
        }
        var isImgP = el.tagName === 'P' && el.children.length === 1 && el.children[0].tagName === 'IMG';
        if (isImgP) {
          var start = i;
          var gallery = document.createElement('div');
          gallery.className = 'content-gallery';
          while (i < children.length) {
            var cur = children[i];
            if (cur.tagName === 'P' && cur.children.length === 1 && cur.children[0].tagName === 'IMG') {
              var img = cur.children[0];
              var alt = img.getAttribute('alt') || '';
              var fig = document.createElement('figure');
              fig.appendChild(img);
              if (alt) {
                var cap = document.createElement('figcaption');
                cap.textContent = alt;
                fig.appendChild(cap);
              }
              gallery.appendChild(fig);
              i++;
            } else break;
          }
          if (gallery.children.length > 0) {
            content.replaceChild(gallery, children[start]);
            for (var j = start + 1; j < i; j++) {
              content.removeChild(children[j]);
            }
          }
        } else {
          i++;
        }
      }
      Array.from(content.querySelectorAll('p')).forEach(function(p) {
        if (p.children.length !== 1 || p.children[0].tagName !== 'IMG') return;
        var img = p.children[0];
        var alt = img.getAttribute('alt');
        if (alt) {
          var fig = document.createElement('figure');
          fig.appendChild(img);
          var cap = document.createElement('figcaption');
          cap.textContent = alt;
          fig.appendChild(cap);
          p.parentNode.replaceChild(fig, p);
        }
      });
      content.querySelectorAll('img').forEach(function(img) {
        if (!img.getAttribute('loading')) img.setAttribute('loading', 'lazy');
      });
    })();
  </script>
  {% if site.baseurl != "" %}
  <script>
    (function() {
      var base = '{{ site.baseurl }}';
      document.querySelectorAll('.post-content img').forEach(function(img) {
        var src = img.getAttribute('src');
        if (src && src.charAt(0) === '/' && src.indexOf(base) !== 0) {
          img.src = base + src;
        }
      });
    })();
  </script>
  {% endif %}
</body>
</html>
