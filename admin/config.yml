backend:
  name: git-gateway
  branch: main

site_url: https://thebestlistindia.com
display_url: https://thebestlistindia.com

media_folder: assets/images/posts
public_folder: /assets/images/posts

collections:
  - name: drafts
    label: "Drafts"
    label_singular: "Draft"
    folder: _drafts
    create: true
    slug: "{{fields.slug}}"
    summary: "{{title}} (draft)"
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string }
      - { label: URL Slug, name: slug, widget: string, hint: "Use for the final post URL when you publish" }
      - { label: Publish Date, name: date, widget: datetime, format: "YYYY-MM-DD HH:mm:ss ZZ" }
      - { label: Author, name: author, widget: string, default: "TheBestList Team" }
      - { label: Categories, name: categories, widget: select, multiple: true, options: [Fashion, Weddings, Travel, Beauty, Pop Culture, Food, Tech, Lifestyle, Health, Finance] }
      - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string } }
      - { label: Banner Image, name: image, widget: image, required: false }
      - { label: Featured?, name: featured, widget: boolean, default: false }
      - { label: SEO Title, name: meta_title, widget: string, required: false }
      - { label: Meta Description, name: excerpt, widget: text }
      - { label: YouTube URL, name: youtube_url, widget: string, required: false }
      - { label: Instagram URL, name: instagram_url, widget: string, required: false }
      - { label: Image Gallery, name: gallery, widget: list, required: false, fields: [{ label: Image, name: image, widget: image }, { label: Caption, name: caption, widget: string, required: false }] }
      - { label: Content, name: body, widget: markdown, hint: "When ready to publish, create a new post in Blog Posts and copy this content." }

  - name: posts
    label: "Blog Posts"
    label_singular: "Post"
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    preview_path: "{{categories.0}}/{{fields.slug}}"
    summary: "{{title}} — {{date | date('DD MMM YYYY')}}"

    fields:

      - label: Layout
        name: layout
        widget: hidden
        default: post

      # ── Core ──────────────────────────────────────────────────
      - label: "Title"
        name: title
        widget: string
        hint: "The main headline shown on the post page"

      - label: "URL Slug"
        name: slug
        widget: string
        hint: "The URL of the post — auto-filled from the title. Use lowercase letters and hyphens only. Example: best-coffee-shops-mumbai"
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Lowercase letters, numbers and hyphens only. No spaces."]

      - label: "Publish Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        date_format: "DD MMM YYYY"
        time_format: "HH:mm"

      - label: "Author"
        name: author
        widget: string
        default: "TheBestList Team"

      # ── Taxonomy ──────────────────────────────────────────────
      - label: "Categories"
        name: categories
        widget: select
        multiple: true
        options:
          - Fashion
          - Weddings
          - Travel
          - Beauty
          - Pop Culture
          - Food
          - Tech
          - Lifestyle
          - Health
          - Finance
        hint: "Pick one or more categories"

      - label: "Tags"
        name: tags
        widget: list
        allow_add: true
        hint: "Type a tag and press Enter (e.g. mumbai, weekend-trips, coffee)"
        field:
          label: Tag
          name: tag
          widget: string

      # ── Images ────────────────────────────────────────────────
      - label: "Banner Image"
        name: image
        widget: image
        required: false
        hint: "Main image shown at the top of the post (recommended: 1200×630px)"

      - label: "Featured Post?"
        name: featured
        widget: boolean
        default: false
        hint: "Turn on to show this post prominently on the homepage"

      # ── SEO ───────────────────────────────────────────────────
      - label: "SEO Title"
        name: meta_title
        widget: string
        required: false
        hint: "Title shown in Google search results and browser tab. If blank, the post Title is used. Keep under 60 characters."

      - label: "Meta Description"
        name: excerpt
        widget: text
        hint: "Shown in Google search results and post preview cards. Keep under 160 characters."

      # ── Embeds ────────────────────────────────────────────────
      - label: "YouTube Video URL"
        name: youtube_url
        widget: string
        required: false
        hint: "Paste a full YouTube URL (e.g. https://youtu.be/xxxxx). Embedded automatically after the post content."

      - label: "Instagram Post URL"
        name: instagram_url
        widget: string
        required: false
        hint: "Paste a full Instagram post URL (e.g. https://www.instagram.com/p/xxxxx/). Embedded automatically after the content."

      # ── Gallery (multiple images) ───────────────────────────────
      - label: "Image Gallery"
        name: gallery
        widget: list
        required: false
        hint: "Add multiple images here for a gallery. Drag to reorder."
        fields:
          - { label: Image, name: image, widget: image }
          - { label: Caption, name: caption, widget: string, required: false }

      # ── Content ───────────────────────────────────────────────
      - label: "Content"
        name: body
        widget: markdown
        default: "## Introduction\n\nWrite a brief intro here.\n\n## 1. First Item\n\n...\n\n## 2. Second Item\n\n...\n\n## 3. Third Item\n\n...\n\n## Summary\n\nWrap up with key takeaways."
        hint: "Undo: Ctrl+Z (Cmd+Z on Mac). Redo: Ctrl+Shift+Z. Use the Image Gallery field above for multiple images."
