backend:
  name: git-gateway
  branch: main

site_url: https://thebestlistindia.com
display_url: https://thebestlistindia.com

media_folder: assets/images/posts
public_folder: /assets/images/posts

collections:
  - name: posts
    label: "Blog Posts"
    label_singular: "Post"
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{fields.slug}}"
    preview_path: "{{categories}}/{{fields.slug}}"
    summary: "{{title}} — {{date | date('DD MMM YYYY')}}"

    fields:

      - label: Layout
        name: layout
        widget: hidden
        default: post

      # ── Core ──────────────────────────────────────────────────
      - label: "Title"
        name: title
        widget: string
        hint: "The main headline shown on the post page"

      - label: "URL Slug"
        name: slug
        widget: string
        hint: "The URL of the post — auto-filled from the title. Use lowercase letters and hyphens only. Example: best-coffee-shops-mumbai"
        pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Lowercase letters, numbers and hyphens only. No spaces."]

      - label: "Publish Date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        date_format: "DD MMM YYYY"
        time_format: "HH:mm"

      - label: "Author"
        name: author
        widget: string
        default: "TheBestList Team"

      # ── Taxonomy ──────────────────────────────────────────────
      - label: "Categories"
        name: categories
        widget: select
        multiple: true
        options:
          - Fashion
          - Weddings
          - Travel
          - Beauty
          - Pop Culture
          - Food
          - Tech
          - Lifestyle
          - Health
          - Finance
        hint: "Pick one or more categories"

      - label: "Tags"
        name: tags
        widget: list
        allow_add: true
        hint: "Type a tag and press Enter (e.g. mumbai, weekend-trips, coffee)"
        field:
          label: Tag
          name: tag
          widget: string

      # ── Images ────────────────────────────────────────────────
      - label: "Banner Image"
        name: image
        widget: image
        required: false
        hint: "Main image shown at the top of the post (recommended: 1200×630px)"

      - label: "Featured Post?"
        name: featured
        widget: boolean
        default: false
        hint: "Turn on to show this post prominently on the homepage"

      # ── SEO ───────────────────────────────────────────────────
      - label: "SEO Title"
        name: meta_title
        widget: string
        required: false
        hint: "Title shown in Google search results and browser tab. If blank, the post Title is used. Keep under 60 characters."

      - label: "Meta Description"
        name: excerpt
        widget: text
        hint: "Shown in Google search results and post preview cards. Keep under 160 characters."

      # ── Embeds ────────────────────────────────────────────────
      - label: "YouTube Video URL"
        name: youtube_url
        widget: string
        required: false
        hint: "Paste a full YouTube URL (e.g. https://youtu.be/xxxxx). Embedded automatically after the post content."

      - label: "Instagram Post URL"
        name: instagram_url
        widget: string
        required: false
        hint: "Paste a full Instagram post URL (e.g. https://www.instagram.com/p/xxxxx/). Embedded automatically after the content."

      # ── Content ───────────────────────────────────────────────
      - label: "Content"
        name: body
        widget: markdown
        hint: "Write your full post here. Use the toolbar to add headings, bold/italic, bullet lists, links, and inline images."
