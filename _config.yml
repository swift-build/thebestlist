# Site settings
title: The Best List India
description: "Curating the best of Fashion, Weddings, Travel, Beauty, Pop Culture & Food — all in one place."

# Google Search Console — paste your verification code from search.google.com/search-console
# Leave empty until you add your site. Example: "abc123xyz"
google_site_verification: ""

# Social links (used in footer)
social:
  instagram: "https://www.instagram.com/thebestlist_in/"
  facebook: "https://www.facebook.com/profile.php?id=61587448350874"

# FOR GITHUB PAGES (swift-build.github.io/thebestlist)
url: "https://thebestlistindia.com"
baseurl: ""

# FOR CUSTOM DOMAIN (uncomment these and comment above when domain is set up)
# url: "https://thebestlist.in"
# baseurl: ""

# Build settings
markdown: kramdown
permalink: /:categories/:slug/

# Pagination
paginate: 6
paginate_path: "/page/:num/"

# Collections
collections:
  categories:
    output: true
    permalink: /category/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "TheBestList Team"

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
