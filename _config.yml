# Site settings
title: The Best List India
description: "Curating the best of Fashion, Weddings, Travel, Beauty, Pop Culture & Food — all in one place."

# FOR GITHUB PAGES (swift-build.github.io/thebestlist)
url: "https://thebestlistindia.com"
baseurl: ""

# FOR CUSTOM DOMAIN (uncomment these and comment above when domain is set up)
# url: "https://thebestlist.in"
# baseurl: ""

# Build settings
markdown: kramdown
permalink: /:categories/:title/

# Pagination
paginate: 6
paginate_path: "/page/:num/"

# Collections
collections:
  categories:
    output: true
    permalink: /category/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "TheBestList Team"

# Plugins (gems for Jekyll 3, plugins for Jekyll 4)
gems:
  - jekyll-paginate
  - jekyll-seo-tag
plugins:
  - jekyll-paginate
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
